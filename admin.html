<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMT EARN Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2563eb;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{

background:#fff;

padding:20px;

margin-bottom:20px;

border-radius:10px;

box-shadow:0 2px 10px rgba(0,0,0,.15);

}

.card h3{

margin-bottom:10px;

color:#2563eb;

}

.card p{

margin:6px 0;

}

button{

padding:10px 18px;

border:none;

border-radius:6px;

cursor:pointer;

margin-top:10px;

margin-right:10px;

color:white;

font-size:15px;

}

.accept{

background:#16a34a;

}

.reject{

background:#dc2626;

}

.pending{

display:inline-block;

padding:6px 12px;

background:orange;

color:white;

border-radius:5px;

font-size:14px;

margin-top:8px;

}

</style>

</head>

<body>

<header>

IMT EARN Admin Panel

</header>

<div class="container">

<div id="requestList">

<h2 style="text-align:center">

Loading Deposit Requests...

</h2>

</div>

</div>
<script type="module">

import { auth, db } from "./firebase.js";

import {
collection,
query,
orderBy,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const requestList=document.getElementById("requestList");

const q=query(
collection(db,"deposits"),
orderBy("createdAt","desc")
);

onSnapshot(q,(snapshot)=>{

requestList.innerHTML="";

if(snapshot.empty){

requestList.innerHTML="<h2>No Deposit Requests</h2>";

return;

}

snapshot.forEach((deposit)=>{

const data=deposit.data();

requestList.innerHTML+=`

<div class="card">

<h3>${data.name || "User"}</h3>

<p><b>Email:</b> ${data.email}</p>

<p><b>Amount:</b> Rs. ${data.amount}</p>

<p><b>Transaction ID:</b> ${data.trxid}</p>

<p><b>Status:</b> ${data.status}</p>

<span class="pending">${data.status}</span>

<br><br>

<button
class="accept"
onclick="approveDeposit('${deposit.id}')">
Approve
</button>

<button
class="reject"
onclick="rejectDeposit('${deposit.id}')">
Reject
</button>

</div>

`;

});

});

window.approveDeposit=async(id)=>{

await updateDoc(doc(db,"deposits",id),{

status:"Approved"

});

alert("Deposit Approved Successfully");

};

window.rejectDeposit=async(id)=>{

await updateDoc(doc(db,"deposits",id),{

status:"Rejected"

});

alert("Deposit Rejected");

};

</script>

</body>
</html>
