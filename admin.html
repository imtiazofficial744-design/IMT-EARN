<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMT EARN Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#2563eb;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
color:#fff;
}

.accept{
background:green;
}

.reject{
background:red;
}
</style>
</head>

<body>

<header>IMT EARN Admin Panel</header>

<div class="container">

<div class="card">
<h3>Withdrawal Request</h3>
<p>User: Demo User</p>
<p>Amount: Rs. 5000</p>

<button class="accept">Accept</button>
<button class="reject">Reject</button>
</div>

<div class="card">
<h3>Investment Request</h3>
<p>User: Demo User</p>
<p>Plan: VIP 1</p>

<button class="accept">Accept</button>
<button class="reject">Reject</button>
</div>

</div>

</body>
</html>
