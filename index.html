<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMT EARN Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0d6efd;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h2{
margin-bottom:10px;
color:#0d6efd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0d6efd;
color:#fff;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

.logout{
background:#dc3545;
}

.logout:hover{
background:#bb2d3b;
}

.user-box{
background:#eef5ff;
padding:12px;
border-radius:8px;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}
</style>

</head>

<body>

<header>
IMT EARN
</header>

<div class="container">

<div class="card">

<h2>Welcome</h2>

<div class="user-box">

<p id="userName">Loading...</p>

<p id="userEmail"></p>

</div>

</div>

<div class="card">

<h2>Dashboard</h2>

<button id="depositBtn">
💰 Deposit
</button>

<button id="withdrawBtn">
💸 Withdraw
</button>

<button id="adminBtn">
🛠 Admin Panel
</button>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>

</div>

<footer>
© 2026 IMT EARN
</footer>
<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
doc,
getDoc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const userName=document.getElementById("userName");
const userEmail=document.getElementById("userEmail");
const logoutBtn=document.getElementById("logoutBtn");

onAuthStateChanged(auth,async(user)=>{

if(user){

userName.innerText="👋 Welcome, "+(user.displayName || "User");
userEmail.innerText=user.email;

const userRef=doc(db,"users",user.uid);

const snap=await getDoc(userRef);

if(!snap.exists()){

await setDoc(userRef,{
name:user.displayName || "",
email:user.email,
balance:0,
createdAt:serverTimestamp()
});

}

}else{

window.location.href="login.html";

}

});

document.getElementById("depositBtn").addEventListener("click",()=>{

window.location.href="deposit.html";

});

document.getElementById("withdrawBtn").addEventListener("click",()=>{

alert("Withdraw page will be added in the next step.");

});

document.getElementById("adminBtn").addEventListener("click",()=>{

window.location.href="admin.html";

});

logoutBtn.addEventListener("click",async()=>{

await signOut(auth);

window.location.href="login.html";

});

</script>

</body>
</html>
