<!DOCTYPE html>
<html>
<head>
<title>IMT Earn</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#0b5ed7;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px gray;
}

.balance{
font-size:30px;
color:green;
font-weight:bold;
text-align:center;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ddd;
}

th,td{
padding:10px;
text-align:center;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 5px gray;
}
</style>

</head>

<body>

<div class="header">
IMT EARN
</div>

<div class="card">
<b>👤 Abdul Rehman</b><br>
Package : Rs.2000
</div>

<div class="card">
<div class="balance">
Rs.370
</div>

<center>
<button onclick="showWithdraw()">Withdraw</button>
<button>Deposit</button>
</center>

</div>

<div class="card">

<table>

<tr>
<th>Total Earn</th>
<th>Team Earn</th>
<th>Withdraw</th>
</tr>

<tr>
<td>540</td>
<td>270</td>
<td>170</td>
</tr>

</table>

</div>

<div class="card">

<b>Referral Link</b>

<p>
https://imt-earn.com/ref123
</p>

<button>Copy Link</button>

</div>

<div class="card">

<b>Gift Code</b>

<br><br>

<input type="text" placeholder="Gift Code">

<button>Redeem</button>

</div>

<div class="card">

<b>Packages</b>

<table>

<tr>
<th>Package</th>
<th>Direct</th>
<th>Indirect</th>
</tr>

<tr><td>1000</td><td>270</td><td>20</td></tr>
<tr><td>2000</td><td>540</td><td>40</td></tr>
<tr><td>4000</td><td>1080</td><td>80</td></tr>

</table>

</div>
<div id="withdrawBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);">

<div style="background:#fff;width:90%;max-width:350px;margin:80px auto;padding:20px;border-radius:10px;">

<h3>Withdraw Request</h3>

<input type="text" placeholder="Enter Amount" style="width:100%;padding:10px;margin:8px 0;">

<input type="text" placeholder="JazzCash / Easypaisa Number" style="width:100%;padding:10px;margin:8px 0;">

<button onclick="submitWithdraw()">Submit</button>

<button onclick="closeWithdraw()">Close</button>

</div>

</div>

<script>

function showWithdraw(){
document.getElementById("withdrawBox").style.display="block";
}

function closeWithdraw(){
document.getElementById("withdrawBox").style.display="none";
}

function submitWithdraw(){
alert("Withdraw Request Submitted");
closeWithdraw();
}

</script>


</body>
</html>
