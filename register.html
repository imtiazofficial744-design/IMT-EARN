<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMT EARN - Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

p{
text-align:center;
margin-top:15px;
}

a{
text-decoration:none;
color:#2563eb;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Create Account</button>

<p>Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</body>
</html>
